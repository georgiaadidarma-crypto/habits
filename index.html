<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanguard Habit Matrix</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" />
    <!-- Lucide Icons Custom Import -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              display: ["Space Grotesk", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            colors: {
              cyber: {
                blue: '#3b82f6',
                teal: '#06b6d4',
                pink: '#ec4899',
                red: '#ef4444',
                slate: '#1e293b',
                dark: '#020617',
              }
            }
          }
        }
      }

    <style>
      /* Glowing and Scifi HUD Effects */
      .glow-teal {
        filter: drop-shadow(0 0 8px rgba(6, 182, 212, 0.45));
      }
      .glow-pink {
        filter: drop-shadow(0 0 8px rgba(236, 72, 153, 0.45));
      }
      .glow-blue {
        filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.45));
      }
      .glow-red {
        filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.45));
      }
      .text-glow-teal {
        text-shadow: 0 0 8px rgba(6, 182, 212, 0.6);
      }
      .text-glow-pink {
        text-shadow: 0 0 8px rgba(236, 72, 153, 0.6);
      }
      
      /* Grid background animated */
      .cyber-grid {
        background-color: #030712;
        background-image: 
          linear-gradient(rgba(18, 24, 38, 0.4) 1px, transparent 1px),
          linear-gradient(90deg, rgba(18, 24, 38, 0.4) 1px, transparent 1px);
        background-size: 20px 20px;
        background-position: center;
      }

      /* Custom scrollbars */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #020617;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3b82f6;
      }

      /* Scanning lines effect */
      .scanline {
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          to bottom,
          rgba(255,255,255,0),
          rgba(255,255,255,0) 50%,
          rgba(0, 212, 255, 0.03) 50%,
          rgba(0, 212, 255, 0.03)
        );
        background-size: 100% 4px;
        pointer-events: none;
      }

      @keyframes scan {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100%); }
      }
      .scan-beam {
        animation: scan 4s linear infinite;
      }

      @keyframes radar-pulse {
        0% { transform: scale(0.9); opacity: 0.1; }
        50% { opacity: 0.5; }
        100% { transform: scale(1.6); opacity: 0; }
      }
      .radar-wave {
        animation: radar-pulse 3s infinite linear;
      }

      /* Screen shake for interactive responses */
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-4px); }
        75% { transform: translateX(4px); }
      }
      .anim-shake {
        animation: shake 0.2s ease-in-out 2;
      }

      /* Custom checkbox cyber toggle */
      .cyber-checkbox:checked + label .checkbox-box {
        background-color: #06b6d4;
        border-color: #06b6d4;
        box-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
      }

      /* LIGHT THEME ACCESSIBILITY OVERRIDES */
      body.light-theme {
        background-color: #f1f5f9;
        background-image: 
          linear-gradient(rgba(148, 163, 184, 0.15) 1px, transparent 1px),
          linear-gradient(90deg, rgba(148, 163, 184, 0.15) 1px, transparent 1px);
        background-size: 20px 20px;
        color: #0f172a;
      }
      body.light-theme #phone-shell {
        background-color: rgba(255, 255, 255, 0.98);
        border-color: #cbd5e1;
        box-shadow: 0 25px 50px -12px rgba(148, 163, 184, 0.4);
      }
      body.light-theme header,
      body.light-theme nav {
        background-color: rgba(248, 250, 252, 0.96);
        border-color: #e2e8f0;
      }
      body.light-theme .text-slate-100 {
        color: #1e293b;
      }
      body.light-theme .text-slate-200 {
        color: #334155;
      }
      body.light-theme .text-slate-300 {
        color: #475569;
      }
      body.light-theme .text-slate-400 {
        color: #64748b;
      }
      body.light-theme .text-slate-500 {
        color: #94a3b8;
      }
      body.light-theme .text-white {
        color: #0f172a;
      }
      body.light-theme .bg-slate-950,
      body.light-theme .bg-slate-950\/90,
      body.light-theme .bg-slate-950\/95,
      body.light-theme .bg-slate-950\/80,
      body.light-theme .bg-slate-950\/40 {
        background-color: #ffffff;
      }
      body.light-theme .bg-slate-900,
      body.light-theme .bg-slate-900\/70,
      body.light-theme .bg-slate-900\/60,
      body.light-theme .bg-slate-900\/40 {
        background-color: #f1f5f9;
        border-color: #e2e8f0;
      }
      body.light-theme .border-slate-900,
      body.light-theme .border-slate-800,
      body.light-theme .border-slate-850 {
        border-color: #cbd5e1;
      }
      body.light-theme .bg-black,
      body.light-theme .bg-black\/85,
      body.light-theme .bg-slate-950\/30 {
        background-color: #f8fafc;
        border-color: #cbd5e1;
      }
      body.light-theme #content-pane {
        background-color: #ffffff;
      }
      body.light-theme .text-glow-teal {
        text-shadow: 0 0 6px rgba(6, 182, 212, 0.35);
      }
      body.light-theme .text-cyan-400 {
        color: #0891b2;
      }
      body.light-theme .text-purple-400 {
        color: #7c3aed;
      }
    </style>
  </head>

          <div class="relative group active:scale-95 duration-100">
            <div id="header-avatar-container" class="w-9 h-9 rounded-full border border-cyan-500 overflow-hidden bg-black flex items-center justify-center shadow-[0_0_8px_rgba(6,182,212,0.3)] relative">

          </div>

      <!-- FLOATING TOAST ALERTS OVERLAY CONTAINER -->
      <div id="toast-container" class="absolute top-20 inset-x-4 z-50 flex flex-col space-y-2 pointer-events-none"></div>

      <!-- MAIN SCROLLABLE DYNAMIC CONTENT CONTAINER -->
      <main id="content-pane" class="flex-1 overflow-y-auto pt-2 px-4 pb-24 relative select-none">
        <!-- Rendered Tab Content Appears Dynamically Here via loadCurrentView() -->
      </main>

      <!-- FIXED SYSTEM BOTTOM NAVIGATION MENU -->
      <nav class="absolute bottom-0 inset-x-0 bg-slate-950/95 border-t border-slate-900 z-40 px-3 pt-2 pb-5 flex items-center justify-between select-none">
        
        <!-- Tab 1: HABITS -->
        <button id="nav-btn-habits" onclick="switchTab('habits')" class="flex flex-col items-center justify-center flex-1 py-1.5 transition-all text-cyan-400 group active:scale-95 duration-100 relative">
          <i data-lucide="shield-check" class="w-5.5 h-5.5 transition-all group-hover:scale-110 active:scale-95"></i>
          <span class="text-[9px] font-mono tracking-wider mt-1 uppercase">HABITS</span>
          <div class="absolute bottom-0 w-8 h-0.5 bg-cyan-400 rounded-full transition-all duration-300 opacity-100 shadow-teal"></div>
        </button>

        <!-- Tab 2: STATS -->
        <button id="nav-btn-stats" onclick="switchTab('stats')" class="flex flex-col items-center justify-center flex-1 py-1.5 transition-all text-slate-400 group active:scale-95 duration-100 relative">
          <i data-lucide="bar-chart-3" class="w-5.5 h-5.5 transition-all group-hover:scale-110 active:scale-95"></i>
          <span class="text-[9px] font-mono tracking-wider mt-1 uppercase">STATS</span>
          <div class="absolute bottom-0 w-8 h-0.5 bg-pink-400 rounded-full transition-all duration-300 opacity-0 bg-transparent"></div>
        </button>

        <!-- Tab 3: SHOP (The Crystal Store) -->
        <button id="nav-btn-shop" onclick="switchTab('shop')" class="flex flex-col items-center justify-center flex-1 py-1.5 transition-all text-slate-400 group active:scale-95 duration-100 relative">
          <i data-lucide="shopping-bag" class="w-5.5 h-5.5 transition-all group-hover:scale-110 active:scale-95"></i>
          <span class="text-[9px] font-mono tracking-wider mt-1 uppercase">SHOP</span>
          <div class="absolute bottom-0 w-8 h-0.5 bg-amber-400 rounded-full transition-all duration-300 opacity-0 bg-transparent"></div>
        </button>

        <!-- Tab 4: SETTINGS (Theme, Reset, Levels Map & Diagnostics) -->
        <button id="nav-btn-settings" onclick="switchTab('settings')" class="flex flex-col items-center justify-center flex-1 py-1.5 transition-all text-slate-400 group active:scale-95 duration-100 relative">
          <i data-lucide="sliders" class="w-5.5 h-5.5 transition-all group-hover:scale-110 active:scale-95"></i>
          <span class="text-[9px] font-mono tracking-wider mt-1 uppercase">SETTINGS</span>
          <div class="absolute bottom-0 w-8 h-0.5 bg-emerald-400 rounded-full transition-all duration-300 opacity-0 bg-transparent"></div>
        </button>

        <!-- Tab 5: PROFILE (Telemetry Credentials) -->
        <button id="nav-btn-profile" onclick="switchTab('profile')" class="flex flex-col items-center justify-center flex-1 py-1.5 transition-all text-slate-400 group active:scale-95 duration-100 relative">
          <i data-lucide="fingerprint" class="w-5.5 h-5.5 transition-all group-hover:scale-110 active:scale-95"></i>
          <span class="text-[9px] font-mono tracking-wider mt-1 uppercase">PROFILE</span>
          <div class="absolute bottom-0 w-8 h-0.5 bg-purple-400 rounded-full transition-all duration-300 opacity-0 bg-transparent"></div>
        </button>
      </nav>

    </div>

    <!-- FontAwesome Library CDN for rich gaming styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- REACIVE JAVASCRIPT APP STATE & INTERACTIVITY ENGINE -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      // 4. Hardcoded Cloud Persistence Configuration
      const firebaseConfig = {
        apiKey: "[PASTE_YOUR_VITE_FIREBASE_API_KEY_HERE]",
        authDomain: "[PASTE_YOUR_VITE_FIREBASE_AUTH_DOMAIN_HERE]",
        projectId: "[PASTE_YOUR_VITE_FIREBASE_PROJECT_ID_HERE]",
        storageBucket: "[PASTE_YOUR_VITE_FIREBASE_STORAGE_BUCKET_HERE]",
        messagingSenderId: "[PASTE_YOUR_VITE_FIREBASE_MESSAGING_SENDER_ID_HERE]",
        appId: "[PASTE_YOUR_VITE_FIREBASE_APP_ID_HERE]",
        databaseId: "[PASTE_YOUR_VITE_FIREBASE_FIRESTORE_DATABASE_ID_HERE]"
      };

      // Configuration Valid Check (fallback to LocalStorage seamlessly to prevent failure in development/offline modes)
      const isConfigValid = firebaseConfig.apiKey && 
                            !firebaseConfig.apiKey.includes("PASTE_YOUR_VITE_FIREBASE") && 
                            firebaseConfig.apiKey !== "";

      let app = null;
      let auth = null;
      let db = null;
      let googleProvider = null;

      // Dynamic rendering of avatar layered with purchased cosmetic accessories
      window.renderDynamicAvatarHTML = function(avatarSrc, extraContainerClasses = "", sizeStyle = "home") {
        if (!storeState || !storeState.inventory) {
          return `<img src="${avatarSrc}" class="w-full h-full object-contain p-1 rounded-full bg-black">`;
        }
        const hasHalo = storeState.inventory.includes("digital_halo");
        const hasVisor = storeState.inventory.includes("cyber_visor");
        const hasEP = storeState.inventory.includes("ear_piece");

        // Determine scale classes if halo is owned
        let bodyWrapperStyle = "";
        let haloStyle = "";
        let visorStyle = "";
        let earPieceStyle = "";

        if (sizeStyle === "profile") {
          // Large profile box (w-64 h-64)
          bodyWrapperStyle = hasHalo ? "transform scale-[0.62] translate-y-[22%] transition-all duration-300" : "transform scale-100 translate-y-0 transition-all duration-300";
          haloStyle = "absolute top-[1%] left-1/2 -translate-x-1/2 w-[68%] h-[36%] object-contain mix-blend-screen z-10 pointer-events-none drop-shadow-[0_0_8px_rgba(236,72,153,0.4)] animate-pulse";
          visorStyle = "absolute top-[41%] left-[50%] -translate-x-1/2 -translate-y-1/2 w-[32%] z-20 pointer-events-none filter drop-shadow-[0_0_6px_rgba(6,182,212,0.7)]";
          earPieceStyle = "absolute top-[46%] left-[65%] -translate-x-1/2 -translate-y-1/2 w-[22%] z-15 pointer-events-none filter drop-shadow-[0_0_4px_rgba(147,51,234,0.6)]";
        } else if (sizeStyle === "home") {
          // Medium home badge (w-10 h-10)
          bodyWrapperStyle = hasHalo ? "transform scale-[0.62] translate-y-[20%] transition-none" : "transform scale-100 translate-y-0 transition-none";
          haloStyle = "absolute top-[1%] left-1/2 -translate-x-1/2 w-[70%] h-[36%] object-contain mix-blend-screen z-10 pointer-events-none drop-shadow-[0_0_4px_rgba(236,72,153,0.4)]";
          visorStyle = "absolute top-[41%] left-[50%] -translate-x-1/2 -translate-y-1/2 w-[32%] z-20 pointer-events-none";
          earPieceStyle = "absolute top-[45%] left-[65%] -translate-x-1/2 -translate-y-1/2 w-[22%] z-15 pointer-events-none";
        } else {
          // Small header icon (w-9 h-9)
          bodyWrapperStyle = hasHalo ? "transform scale-[0.62] translate-y-[18%] transition-none" : "transform scale-100 translate-y-0 transition-none";
          haloStyle = "absolute top-[0.5px] left-1/2 -translate-x-1/2 w-[72%] h-[36%] object-contain mix-blend-screen z-10 pointer-events-none";
          visorStyle = "absolute top-[41%] left-[50%] -translate-x-1/2 -translate-y-1/2 w-[32%] z-20 pointer-events-none";
          earPieceStyle = "absolute top-[45%] left-[65%] -translate-x-1/2 -translate-y-1/2 w-[22%] z-15 pointer-events-none";
        }

        return `
          <div class="relative w-full h-full bg-black flex items-center justify-center overflow-hidden ${extraContainerClasses}">
            ${hasHalo ? `<img src="https://res.cloudinary.com/dlbr6gk6w/image/upload/v1779963072/Fix_smudged_lines_design_202605281710_kkgwbl.jpg" alt="Halo" class="${haloStyle}" style="mix-blend-mode: screen;">` : ""}
            <div class="relative w-full h-full flex items-center justify-center ${bodyWrapperStyle}">
              <img src="${avatarSrc}" referrerpolicy="no-referrer" class="w-full h-full object-contain p-1 rounded-full bg-black" alt="Character Portrait">
              ${hasVisor ? `<img src="https://res.cloudinary.com/dlbr6gk6w/image/upload/v1779961787/Refine_image_quality_same_style_202605281544-removebg-preview_bmagls.png" alt="Visor" class="${visorStyle}">` : ""}
              ${hasEP ? `<img src="https://res.cloudinary.com/dlbr6gk6w/image/upload/v1779961700/Refine_image_make_clear_202605281546-removebg-preview_dowub0.png" alt="Ear Piece" class="${earPieceStyle}">` : ""}
            </div>
          </div>
        `;
      };

      // Local Fallback State
      const DEFAULT_PERSISTENCE_KEY = "VANGUARD_HABIT_STATE_01";
      const defaultState = {
        user: {
          uid: "guest_interceptor_00",
          displayName: "Guest Interceptor",
          email: "guest@vanguard.sys",
          photoURL: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?auto=format&fit=crop&q=80&w=400",
          level: 2,
          rank: "VANGUARD OFFICER",
          xp: 850,
          maxXp: 1000,
          crystals: 150,
          integrity: 75,
          yesterdayMissed: false,
          missedHabitsDetails: [],
          stats: {
            totalXp: 2450,
            perfectDays: 12,
            bestStreak: 14,
            coinsSpent: 450,
            targetsMet: 150
          }
        },
        habits: [
          {
            id: "journal_rest",
            title: "Journal and rest (8:30PM - 9:30PM)",
            desc: "Review logs, disconnect neural channels cleanly",
            xpReward: 15,
            hpImpact: 0,
            crystalsReward: 10,
            completed: false,
            badge: "REST",
            category: "INTEGRITY",
            streak: 14
          },
          {
            id: "study_review",
            title: "Study Review (Homework Complete)",
            desc: "Perform AI photo analysis scan on study sheets or homework documents",
            xpReward: 15,
            hpImpact: -3,
            crystalsReward: 15,
            completed: false,
            badge: "INTEL",
            category: "TRAINING",
            streak: 8
          },
          {
            id: "train_fencing",
            title: "Train Fencing (40m)",
            desc: "Sharpen reflex routines & kinetic blade timing",
            xpReward: 30,
            hpImpact: 0,
            crystalsReward: 20,
            completed: false,
            badge: "COMBAT",
            category: "REFLEX",
            streak: 12
          }
        ],
        unlockedStoreItems: [],
        inventory: ["adv_hud_filter", "titanium_rapier_v2"]
      };

      // Main application current operating state
      let storeState = { ...defaultState };
      let currentTab = "habits";
      let authUser = null;

      // Immersive Interactive Habit Screens States
      let fencingSecondsLeft = 40 * 60; // 2400 seconds
      let fencingTimerActive = false;
      let fencingSpeedMultiplier = 1;

      function getFencingTotalSeconds() {
        if (storeState && storeState.inventory && storeState.inventory.includes("step_glow_effect")) {
          return 35 * 60;
        }
        return 40 * 60;
      }
      let fencingTimerIntervalRef = null;
      let fencingCueTimeoutRef = null;
      let currentFencingCue = null;
      let fencingScoresMatched = 0;
      let fencingRequiredMatches = 5;
      let fencingStream = null;
      let fencingMotionAnimationRef = null;
      let prevFrameData = null;

      let selectedOCRReportType = null;
      let ocrScanIsRunning = false;

      let journalTextLength = 0;
      let journalAIScanIsRunning = false;

      // Initialize Firebase safely
      if (isConfigValid) {
        try {
          app = initializeApp(firebaseConfig);
          auth = getAuth(app);
          db = getFirestore(app);
          googleProvider = new GoogleAuthProvider();
          console.log("⚓ Tactical Cloud Service Online: Firebase activated.");
        } catch (err) {
          console.warn("⚓ Firebase load failed! Activating localized storage protocols.", err);
        }
      } else {
        console.log("⚓ Local Persistence Protocol: Missing credentials. Launching standalone local state sandbox.");
      }

      // Load initial state from browser sandbox cache or fallback default
      function loadPersistedState() {
        try {
          const cached = localStorage.getItem(DEFAULT_PERSISTENCE_KEY);
          if (cached) {
            storeState = JSON.parse(cached);
            // Deep check to prevent broken schemas
            if (!storeState.habits || storeState.habits.length === 0) {
              storeState.habits = [ ...defaultState.habits ];
            }
            if (!storeState.inventory) {
              storeState.inventory = [ ...defaultState.inventory ];
            }
          } else {
            storeState = JSON.parse(JSON.stringify(defaultState));
          }
        } catch (e) {
          storeState = JSON.parse(JSON.stringify(defaultState));
        }

        // Apply theme settings
        if (storeState.theme === "light") {
          document.body.classList.add("light-theme");
        } else {
          document.body.classList.remove("light-theme");
        }

        updateTelemetry();
      }

      // Save state to localStorage and Firestore if user is authenticated

      // Sword clash / Lightsaber sounding synth helper under Web Audio API
      window.playSwordClashSound = function() {
        try {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtx) return;
          const ctx = new AudioCtx();
          
          // Blade sound carrier frequency sweep
          const osc = ctx.createOscillator();
          const gainNode = ctx.createGain();
          
          osc.type = "sawtooth";
          osc.frequency.setValueAtTime(120, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.12);
          osc.frequency.exponentialRampToValueAtTime(180, ctx.currentTime + 0.55);
          
          const filter = ctx.createBiquadFilter();
          filter.type = "bandpass";
          filter.frequency.setValueAtTime(650, ctx.currentTime);
          filter.frequency.exponentialRampToValueAtTime(1600, ctx.currentTime + 0.15);
          filter.frequency.linearRampToValueAtTime(250, ctx.currentTime + 0.6);
          filter.Q.value = 12;
          
          // White noise generators for clash dust & sound energy
          const bufferSize = ctx.sampleRate * 0.45;
          const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
          const chData = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            chData[i] = Math.random() * 2 - 1;
          }
          const noise = ctx.createBufferSource();
          noise.buffer = buffer;
          
          const noiseFilter = ctx.createBiquadFilter();
          noiseFilter.type = "highpass";
          noiseFilter.frequency.setValueAtTime(1200, ctx.currentTime);
          noiseFilter.frequency.exponentialRampToValueAtTime(8500, ctx.currentTime + 0.06);
          noiseFilter.frequency.exponentialRampToValueAtTime(1800, ctx.currentTime + 0.4);
          
          const noiseGain = ctx.createGain();
          
          // Gain node envelopes
          gainNode.gain.setValueAtTime(0.001, ctx.currentTime);
          gainNode.gain.linearRampToValueAtTime(0.35, ctx.currentTime + 0.07);
          gainNode.gain.exponentialRampToValueAtTime(0.08, ctx.currentTime + 0.22);
          gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
          
          noiseGain.gain.setValueAtTime(0.001, ctx.currentTime);
          noiseGain.gain.linearRampToValueAtTime(0.6, ctx.currentTime + 0.03);
          noiseGain.gain.exponentialRampToValueAtTime(0.03, ctx.currentTime + 0.2);
          noiseGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
          
          // Connections
          osc.connect(filter);
          filter.connect(gainNode);
          gainNode.connect(ctx.destination);
          
          noise.connect(noiseFilter);
          noiseFilter.connect(noiseGain);
          noiseGain.connect(ctx.destination);
          
          osc.start(ctx.currentTime);
          noise.start(ctx.currentTime);
          
          osc.stop(ctx.currentTime + 0.65);
          noise.stop(ctx.currentTime + 0.65);
        } catch (e) {
          console.warn("Audio Context sound failed to play: ", e);
        }
      };

          enemyName = "SLOTH TITAN";
        } else if (currentCumulativeXp > 500) {
          penaltyPerHabit = 200;
          enemyName = "INTERCEPTOR UNIT";
        }
        
        let totalPenalty = 0;
        if (missedHabits.length > 0) {
          totalPenalty = missedHabits.length * penaltyPerHabit;
          storeState.user.xp = Math.max(0, storeState.user.xp - totalPenalty);
          storeState.user.yesterdayMissed = true;
          storeState.user.missedHabitsDetails = missedHabits.map(h => h.title);

      // Initialize dynamic motion tracking
      function startFencingMotionTracking() {
        const videoEl = document.getElementById("fencing-video");
        const canvasEl = document.getElementById("fencing-motion-canvas");
        const placeholderEl = document.getElementById("fencing-camera-placeholder");
        const hudTelemetryEl = document.getElementById("fencing-hud-telemetry");

        if (!videoEl || !canvasEl) return;

        navigator.mediaDevices.getUserMedia({
          video: { width: 320, height: 240 }
        }).then(stream => {
          fencingStream = stream;
          videoEl.srcObject = stream;
          videoEl.classList.remove("hidden");
          canvasEl.classList.remove("hidden");
          hudTelemetryEl.classList.remove("hidden");
          if (placeholderEl) placeholderEl.classList.add("hidden");

          // Run processing loop
          runFencingMotionDetectionLoop();
        }).catch(err => {
          console.error("Camera access denied or failed for Fencing:", err);
          window.triggerToast("⚠️ SENSOR ERROR: Camera blocked or unavailable. Fallback triggers active.", false);
        });
      }

      function runFencingMotionDetectionLoop() {
        const videoEl = document.getElementById("fencing-video");
        const canvasEl = document.getElementById("fencing-motion-canvas");

        if (!fencingTimerActive || !videoEl || !canvasEl || !fencingStream) {
          return;
        }

        const ctx = canvasEl.getContext("2d");
        const width = canvasEl.width = 160;
        const height = canvasEl.height = 120;

        // Offscreen canvas for fast, lightweight processing
        const offscreenCanvas = document.createElement("canvas");
        offscreenCanvas.width = 40;
        offscreenCanvas.height = 30;
        const offscreenCtx = offscreenCanvas.getContext("2d");

        function processFrame() {
          if (!fencingTimerActive || !fencingStream) return;

          try {
            if (videoEl.readyState >= 2) { // HAVE_CURRENT_DATA or higher
              // 1. Draw frame to hidden offscreen canvas
              offscreenCtx.drawImage(videoEl, 0, 0, 40, 30);
              const imgData = offscreenCtx.getImageData(0, 0, 40, 30);
              const data = imgData.data;

              // 2. Clear visual debug overlay 
              ctx.clearRect(0, 0, width, height);
              
              if (prevFrameData) {
                let totalPixels = 40 * 30;
                let movingPixelsCount = 0;
                let sumX = 0;
                let sumY = 0;

                // Thresholds for difference and detection
                const pixelDiffThreshold = 20;

                // 3. Compute absolute differential
                for (let i = 0; i < data.length; i += 4) {
                  const rCurrent = data[i];
                  const gCurrent = data[i+1];
                  const bCurrent = data[i+2];

                  const rPrev = prevFrameData[i];
                  const gPrev = prevFrameData[i+1];
                  const bPrev = prevFrameData[i+2];

                  const brightnessCurrent = (rCurrent + gCurrent + bCurrent) / 3;
                  const brightnessPrev = (rPrev + gPrev + bPrev) / 3;

                  const diff = Math.abs(brightnessCurrent - brightnessPrev);

                  if (diff > pixelDiffThreshold) {
                    movingPixelsCount++;
                    const pixelIndex = i / 4;
                    const x = pixelIndex % 40;
                    const y = Math.floor(pixelIndex / 40);
                    sumX += x;
                    sumY += y;

                    // Draw green tracking overlay cells
                    ctx.fillStyle = "rgba(6, 182, 212, 0.25)";
                    ctx.fillRect(x * 4, y * 4, 3.5, 3.5);
                  }
                }

                // Compute telemetry metrics
                const motionRatio = movingPixelsCount / totalPixels;
                const motionPercent = Math.round(motionRatio * 100);

                let centroidX = movingPixelsCount > 10 ? sumX / movingPixelsCount : 20;
                const normalizedX = (centroidX - 20) * 4; // Shift relative to center: -80px to +80px

                // Update HUD Telemetry text
                const energyHud = document.getElementById("telemetry-energy");
                const flowXHud = document.getElementById("telemetry-flow-x");
                const velocityHud = document.getElementById("telemetry-velocity");

                if (energyHud) energyHud.textContent = `${motionPercent}%`;
                if (flowXHud) flowXHud.textContent = `${normalizedX > 0 ? '+' : ''}${normalizedX.toFixed(1)}px`;

                // Render radar tracking target centroid
                if (movingPixelsCount > 10) {
                  ctx.strokeStyle = "rgba(236, 72, 153, 0.8)";
                  ctx.lineWidth = 1;
                  ctx.beginPath();
                  ctx.arc(centroidX * 4, (sumY / movingPixelsCount) * 4, 6, 0, Math.PI * 2);
                  ctx.stroke();

                  ctx.strokeStyle = "rgba(6, 182, 212, 0.45)";
                  ctx.beginPath();
                  ctx.moveTo(centroidX * 4, 0);
                  ctx.lineTo(centroidX * 4, height);
                  ctx.moveTo(0, (sumY / movingPixelsCount) * 4);
                  ctx.lineTo(width, (sumY / movingPixelsCount) * 4);
                  ctx.stroke();
                }

                // 4. MOTION METRIC EVALUATION
                if (currentFencingCue && motionPercent > 6) {
                  let triggerSecured = false;

                  if (currentFencingCue === "PARRY") {
                    // Side sweeping gesture: horizontal centroid deflection
                    if (Math.abs(normalizedX) > 18 && motionPercent > 12) {
                      triggerSecured = true;
                    }
                  } else if (currentFencingCue === "ATTACK") {
                    // Lunge forward or sharp sweep: massive energy spike
                    if (motionPercent > 32) {
                      triggerSecured = true;
                    }
                  } else if (currentFencingCue === "RETREAT") {
                    // Stepping back: centroid goes high (retreat away) and energy is moderate
                    const avgY = sumY / movingPixelsCount;
                    if (motionPercent < 22 && avgY < 13) {
                      triggerSecured = true;
                    }
                  }

                  if (velocityHud) {
                    if (motionPercent > 28) {
                      velocityHud.textContent = "ATTACK SURGE";
                      velocityHud.className = "text-rose-500 font-bold";
                    } else if (Math.abs(normalizedX) > 15) {
                      velocityHud.textContent = "PARRY SWEEP";
                      velocityHud.className = "text-cyan-400 font-bold";
                    } else {
                      velocityHud.textContent = "KINETIC FEED";
                      velocityHud.className = "text-emerald-400";
                    }
                  }

                  if (triggerSecured) {
                    window.handleFencingAction(currentFencingCue);
                  }
                } else {
                  if (velocityHud) {
                    velocityHud.textContent = "STABLE";
                    velocityHud.className = "text-slate-500";
                  }
                }
              }

              prevFrameData = data;
            }
          } catch (err) {
            console.error("Frame processing exception:", err);
          }

          fencingMotionAnimationRef = requestAnimationFrame(processFrame);
        }

        // Start animation frame loop
        prevFrameData = null;
        fencingMotionAnimationRef = requestAnimationFrame(processFrame);
      }

        if (!isConfigValid) {

        }

        try {
          const res = await signInWithPopup(auth, googleProvider);
          const user = res.user;
          authUser = user;

          storeState.user.displayName = user.displayName;
          storeState.user.email = user.email;
          storeState.user.photoURL = user.photoURL;
          storeState.user.uid = user.uid;

          // Attempt loading their private profile record back
          const userDocRef = doc(db, "users", user.uid);
          const record = await getDoc(userDocRef);

          if (record.exists()) {
            const data = record.data();
            storeState.user.xp = data.xp ?? storeState.user.xp;
            storeState.user.level = data.level ?? storeState.user.level;
            storeState.user.crystals = data.crystals ?? storeState.user.crystals;

            storeState.habits = data.habits ?? storeState.habits;
            storeState.inventory = data.inventory ?? storeState.inventory;

          window.triggerToast(`Welcome back Commander, ${user.displayName}!`, true);
          updateTelemetry();
          saveCurrentState();
          loadCurrentView();
        } catch (e) {
          window.triggerToast(`Connection failed: ${e.message}`, false);
          console.error(e);

          window.triggerToast("Cloud session terminated smoothly.", false);

          loadCurrentView();

        }
      };

      };

      // Set up simple system live clock
      function initClock() {
        const tacticalClock = document.getElementById("tactical-clock");
        
        function tick() {
          const now = new Date();
          const hr = String(now.getHours()).padStart(2, "0");
          const mn = String(now.getMinutes()).padStart(2, "0");
          const sc = String(now.getSeconds()).padStart(2, "0");
          
          if (tacticalClock) {
            tacticalClock.textContent = `${hr}:${mn}:${sc}`;
          }

          // Daily reset countdown ticking
          const resetTimerEl = document.getElementById("daily-reset-countdown");
          if (resetTimerEl) {
            const nextMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0, 0);
            const diffMs = nextMidnight.getTime() - now.getTime();
            const hours = Math.floor(diffMs / 3600000);
            const minutes = Math.floor((diffMs % 3600000) / 60000);
            const seconds = Math.floor((diffMs % 60000) / 1000);
            resetTimerEl.textContent = `${String(hours).padStart(2, '0')}h ${String(minutes).padStart(2, '0')}m ${String(seconds).padStart(2, '0')}s`;
          }

          // Automated Reset Checker
          const todayStr = now.toDateString();
          if (!storeState.lastResetDate) {
            storeState.lastResetDate = todayStr;
            saveCurrentState();
          } else if (storeState.lastResetDate !== todayStr) {
            window.triggerDailyReset(todayStr);
          }
        }
        
        setInterval(tick, 1000);
        tick();
      }
